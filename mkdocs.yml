site_name: "gxy 的学习空间"
site_description: "课程笔记、论文阅读与个人知识整理站"
site_url: "https://guoguo828.github.io/mkdocs_start/"
docs_dir: "docs"
site_dir: "site"
use_directory_urls: false
repo_url: "https://github.com/Guoguo828/mkdocs_start"
repo_name: "Guoguo828/mkdocs_start"
edit_uri: "edit/main/docs/"

theme:
  name: "material"
  language: "zh"
  logo: "assets/images/logo.svg"
  custom_dir: "overrides"
  icon:
    repo: "fontawesome/brands/github"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - header.autohide
    - announce.dismiss
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - content.code.annotate
    - content.tooltips
  palette:
    - scheme: "default"
      primary: "custom"
      accent: "custom"
      toggle:
        icon: "material/weather-night"
        name: "切换到深色模式"
    - scheme: "slate"
      primary: "custom"
      accent: "custom"
      toggle:
        icon: "material/weather-sunny"
        name: "切换到浅色模式"
  font:
    text: "Noto Sans SC"
    code: "JetBrains Mono"

plugins:
  - meta
  - search:
      lang:
        - "zh"
        - "en"
      separator: '[\s\-\.]+'
  - tags
  - git-revision-date-localized:
      type: "datetime"
      locale: "zh"
      enable_creation_date: false
      fallback_to_build_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      title: "本页目录"
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - abbr
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys

extra_css:
  - "assets/stylesheets/extra.css"

extra_javascript:
  - "assets/javascripts/particles.min.js"
  - "assets/javascripts/particles.js"
  - "assets/javascripts/site.js"

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn

copyright: "Copyright © 2006-2026 郭响宇"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Guoguo828
      name: GitHub
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com
      name: Bilibili
  generator: false
  alternate:
    - name: 中文
      link: /
      lang: zh

nav:
  - "首页":
      - "欢迎页": "index.md"
      - "使用指南": "使用指南.md"
      - "更新记录": "更新记录.md"
      - "标签索引": "tags.md"
  - "关于我":
      - "GXY 介绍": "首页文章/gxy介绍.md"
      - "简介": "首页文章/关于我.md"
  - "计算机系统":
      - "计算机组成": "计组/index.md"
      - "计算机体系结构": "体系结构/index.md"
      - "数字逻辑": "sl/index.md"
      - "H.265 编码": "H265/index.md"
  - "程序设计与算法":
      - "面向对象编程": "oop/index.md"
      - "数据结构基础": "fds/index.md"
      - "高级数据结构与算法": "ads/index.md"
  - "理论与数据库":
      - "数据库": "数据库/index.md"
      - "离散数学": "ls/index.md"
  - "研究与专题":
      - "论文笔记": "论文笔记/index.md"
      - "AlphaFold2": "alphafold2/index.md"
      - "形势与政策": "形策/index.md"
